<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h1>Painel Admin</h1>

<canvas id="grafico"></canvas>

<script>

async function carregar(){

let req = await fetch("/admin/vendas")

let vendas = await req.json()

let mapa={}

vendas.forEach(v=>{
if(!mapa[v.produto]) mapa[v.produto]=0
mapa[v.produto]++
})

let labels=Object.keys(mapa)
let valores=Object.values(mapa)

new Chart(document.getElementById("grafico"),{

type:"bar",

data:{
labels:labels,
datasets:[{label:"Vendas",data:valores}]
}

})

}

carregar()

</script>
